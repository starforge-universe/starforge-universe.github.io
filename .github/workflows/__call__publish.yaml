name: 'Submodule - Publish'

on:
  workflow_call:

jobs:
  publish:
    name: 'Publish'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout project sources'
        uses: actions/checkout@v7

      - name: 'Download artifacts'
        uses: actions/download-artifact@v8
        with:
          name: website
          path: website
